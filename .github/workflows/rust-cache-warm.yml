# Populate GitHub Actions rust-cache on main so tag release jobs can restore it.
# Caches are ref-scoped; tag runs may restore from the default branch only.
name: rust-cache-warm

on:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
      - "package-lock.json"
      - ".github/workflows/rust-cache-warm.yml"

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Warm release build cache
        run: cargo build --release
        working-directory: src-tauri
