<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
  </head>

  <body>
    <div id="root"></div>
    <!-- Polyfill Node.js Buffer for gray-matter (not available in WebKit/WKWebView) -->
    <script>
      if (typeof Buffer === 'undefined') {
        globalThis.Buffer = {
          isBuffer: () => false,
          from: (data) => {
            var bytes = new TextEncoder().encode(String(data));
            bytes.toString = function (enc) { return new TextDecoder(enc || 'utf-8').decode(this); };
            return bytes;
          },
          concat: (list) => {
            var total = list.reduce((acc, b) => acc + b.length, 0);
            var result = new Uint8Array(total);
            var offset = 0;
            list.forEach((b) => { result.set(b, offset); offset += b.length; });
            result.toString = function (enc) { return new TextDecoder(enc || 'utf-8').decode(this); };
            return result;
          }
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
